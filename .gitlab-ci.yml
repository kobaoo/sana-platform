stages:
  - test
  - build
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

test:
  stage: test
  image: golang:1.26
  services:
    - docker:27-dind
  variables:
    DOCKER_HOST: tcp://localhost:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apt-get update -qq && apt-get install -y -qq docker.io curl git
    - curl -L https://encore.dev/install.sh | bash
    - export PATH="$HOME/.encore/bin:$PATH"
  script:
    - encore test ./...
  only:
    - dev
    - feat/gitlab_ci

